<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</head>

<body class=" d-flex align-items-center vh-100">
    <div class="container-lg ">
        <div class="row justify-content-center ">
            <div class="col-4 ">
                <div class=" input-group flex-nowrap">
                    <span class="input-group-text" id="addon-wrapping">@</span>
                    <input type="text" class="form-control" id="user-input" placeholder="Username" aria-label="Username"
                        aria-describedby="addon-wrapping">
                </div>
                <button class=" w-100 mt-3 btn btn-success" id="inputGroup-sizing-sm">Login</button>
            </div>

        </div>

    </div>
    <script>
        const log = document.getElementById("inputGroup-sizing-sm")
        const input = document.getElementById("user-input")

        log.addEventListener("click", sendMessage);
        function sendMessage() {
            const data = { "author": input.value }
// http://26.190.62.176:8080
            fetch("/login", {
                method: "POST",
                headers: {
                    'Content-Type': "application/json"
                },
                body: JSON.stringify(data)
            })
                .then(res => res.json())
                .then(data => {
                    window.location.href = data.redirect;
                });


            console.log(data)
        }


    </script>
</body>

</html>
